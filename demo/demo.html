<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillet Showcase</title>
    <link rel="stylesheet" href="demo.css">
</head>
<body>
    <header class="hero">
        <p class="eyebrow">Skillet showcase</p>
        <h1>Awake</h1>
        <p class="subtitle">A compact, music-first demo for the theme.</p>
    </header>

    <main class="shell">
        <section class="panel" aria-labelledby="featured">
            <div class="badge">Featured</div>
            <h2 id="featured">Monster</h2>
            <p>2:57 · Alternative Metal</p>
            <audio controls preload="metadata" src="monster.mp3">
                Your browser does not support the audio element.
            </audio>
        </section>

        <section class="panel" aria-labelledby="tracks">
            <h2 id="tracks">Tracklist</h2>
            <ul class="tracks">
                <li><span>Hero</span><span>3:07</span></li>
                <li><span>Awake and Alive</span><span>3:32</span></li>
                <li><span>One Day Too Late</span><span>3:40</span></li>
            </ul>
        </section>
    </main>
</body>
</html>
